<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>George KPIs Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        
        .header {
            background-color: #0078d4;
            color: white;
            padding: 15px;
            text-align: center;
        }
        
        .header img {
            max-width: 100%;
            max-height: 150px;
            height: auto;
            display: block;
            margin: 0 auto 10px auto;
        }
        
        .container {
            padding: 10px;
        }
        
        .chart-frame {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }
        
        iframe {
            width: 100%;
            height: 500px;
            border: none;
            display: block;
        }
        
        .controls {
            text-align: center;
            padding: 10px;
        }
        
        button {
            background-color: #0078d4;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
        }
        
        button:active {
            background-color: #106ebe;
        }
        
        button.add-record {
            background-color: #107c10;
            font-weight: bold;
        }
        
        button.add-record:active {
            background-color: #0e6b0e;
        }
        
        .info {
            background: white;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            font-size: 12px;
            color: #666;
            text-align: center;
        }
        
        /* Login screen styles */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0078d4, #106ebe);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            max-width: 350px;
            width: 90%;
        }
        
        .login-box h2 {
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }
        
        .login-box form {
            width: 100%;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-size: 14px;
        }
        
        .login-box input[type="text"],
        .login-box input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        .login-box button[type="submit"] {
            width: 100%;
            padding: 12px;
            background-color: #0078d4;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .login-box button[type="submit"]:hover {
            background-color: #106ebe;
        }
        
        .error {
            color: #d13438;
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
            padding: 8px;
            background-color: #fde7e9;
            border-radius: 4px;
        }
        
        .success {
            color: #107c10;
            font-size: 14px;
            text-align: center;
            padding: 8px;
            background-color: #dff6dd;
            border-radius: 4px;
            margin-top: 10px;
        }
        
        .hidden {
            display: none;
        }
        
        .login-info {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h2>🔐 KPI Dashboard</h2>
            
            <div id="loginError" class="error hidden">Incorrect credentials</div>
            
            <form id="loginForm" method="post" action="javascript:void(0);">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" 
                           id="username" 
                           name="username"
                           value="kpi-user"
                           autocomplete="username"
                           required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" 
                           id="password" 
                           name="password"
                           placeholder="Enter your password"
                           autocomplete="current-password"
                           required>
                </div>
                
                <button type="submit" id="loginButton">Login</button>
            </form>
            
            <div class="login-info">
                Your browser can save this password
            </div>
        </div>
    </div>

    <!-- Main Content (hidden until authenticated) -->
    <div id="mainContent" class="hidden">
        <div class="header">
            <img src="YOUR_IMAGE_URL" alt="Evolution Logo">
            <h2>George KPIs Dashboard</h2>
        </div>
        
        <div class="container">
            <div class="chart-frame">
                <iframe id="excelFrame" 
                        src=""
                        allowfullscreen>
                </iframe>
            </div>
            
            <div class="controls">
                <button class="add-record" onclick="addKPIRecord()">➕ Add KPI Record</button>
                <button onclick="refreshChart()">🔄 Refresh Chart</button>
                <button onclick="toggleFullscreen()">⛶ Fullscreen</button>
                <button onclick="logout()">🚪 Logout</button>
            </div>
            
            <div id="recordStatus" class="hidden"></div>
            
            <div class="info">
                Last refreshed: <span id="lastUpdate">Page load</span>
            </div>
        </div>
    </div>

    <script>
    const AUTH_FLOW_URL = 'https://default846521e158fa45d6966500118b67a0.d1.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/f15cad7bd122454792db84e5e3be20b7/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=XDXpkI4sgaNoAALz_CGB-4nQSkcA8D7LqWE-rfwS3gw'    // Configuration - ONLY the authentication flow URL is visible in source code
    
    // Session storage keys
    const SESSION_KEY = 'kpi_session_key';
    const RECORD_URL_KEY = 'kpi_record_url';
    
    // Hardcoded URLs that don't need to be hidden
    //const EXCEL_URL = 'YOUR_EXCEL_EMBED_URL_HERE';
    const IMAGE_URL = 'YOUR_IMAGE_URL_HERE';
    
    // Check if already authenticated on page load
    window.onload = function() {
        const savedKey = sessionStorage.getItem(SESSION_KEY);
        const savedRecordUrl = sessionStorage.getItem(RECORD_URL_KEY);
        
        if (savedKey && savedRecordUrl) {
            // Already authenticated, load dashboard
            loadDashboard();
        }
        
        document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
    };
    
    // Handle login form submission
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault();
        handleLogin();
    });
    
    // Authenticate user with Power Automate flow
async function handleLogin() {
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('loginError');
    const loginButton = document.querySelector('#loginForm button[type="submit"]');
    
    // Disable button and show loading (with null check)
    if (loginButton) {
        loginButton.disabled = true;
        loginButton.textContent = 'Authenticating...';
    }
    errorDiv.classList.add('hidden');
    
    try {
        // Call authentication flow
        const response = await fetch(AUTH_FLOW_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                password: password
            })
        });
        
        if (response.ok) {
            const data = await response.json();
            
            // Handle both response formats - extract body if it exists
            const responseBody = data.body || data;
            
            console.log('Response body:', responseBody); // Debug log
            
            // Validate response structure
            if (responseBody.authenticated) {
                
                // Decode and store record flow URL
                if (responseBody.recordFlowUrl) {
                    try {
                        const decodedRecordUrl = decodeURIComponent(responseBody.recordFlowUrl);
                        sessionStorage.setItem(RECORD_URL_KEY, decodedRecordUrl);
                        console.log('Decoded record URL:', decodedRecordUrl); // Debug log
                    } catch (e) {
                        console.error('Error decoding recordFlowUrl:', e);
                        throw new Error('Failed to decode record flow URL');
                    }
                }
                
                // Decode and store Excel URL
                if (responseBody.excelUrl) {
                    try {
                        const decodedExcelUrl = decodeURIComponent(responseBody.excelUrl);
                        sessionStorage.setItem('kpi_excel_url', decodedExcelUrl);
                        console.log('Decoded Excel URL:', decodedExcelUrl); // Debug log
                    } catch (e) {
                        console.error('Error decoding excelUrl:', e);
                        throw new Error('Failed to decode Excel URL');
                    }
                }
                
                // Store password
                sessionStorage.setItem(SESSION_KEY, password);
                
                // Load the dashboard
                loadDashboard();
                
            } else {
                // Log what we received for debugging
                console.error('Response data:', data);
                console.error('Response body:', responseBody);
                throw new Error('Authentication failed - not authenticated');
            }
        } else if (response.status === 401) {
            errorDiv.textContent = 'Incorrect password';
            errorDiv.classList.remove('hidden');
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
        } else {
            errorDiv.textContent = 'Authentication failed. Status: ' + response.status;
            errorDiv.classList.remove('hidden');
        }
    } catch (error) {
        errorDiv.textContent = 'Connection error: ' + error.message;
        errorDiv.classList.remove('hidden');
        console.error('Full error:', error);
    } finally {
        // Re-enable button (with null check)
        if (loginButton) {
            loginButton.disabled = false;
            loginButton.textContent = 'Login';
        }
    }
}
    
    // Load dashboard
function loadDashboard() {
    // Get Excel URL from session storage (returned by auth flow) or use hardcoded
    const excelUrl = sessionStorage.getItem('kpi_excel_url');
    
    // Set Excel iframe URL
    document.getElementById('excelFrame').src = excelUrl;
    
    // Set header image
    const img = document.getElementById('headerImage');
    if (img && IMAGE_URL) {
        img.src = IMAGE_URL;
        img.classList.remove('hidden');
    }
    
    // Show dashboard, hide login
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainContent').classList.remove('hidden');
}

    function logout() {
        sessionStorage.removeItem(SESSION_KEY);
        sessionStorage.removeItem(RECORD_URL_KEY);
        document.getElementById('mainContent').classList.add('hidden');
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('password').value = '';
        document.getElementById('loginError').classList.add('hidden');
        
        // Clear iframe
        document.getElementById('excelFrame').src = '';
    }
    
    // Add KPI record to Dataverse via Power Automate
    async function addKPIRecord() {
        const password = sessionStorage.getItem(SESSION_KEY);
        const recordUrl = sessionStorage.getItem(RECORD_URL_KEY);
        const statusDiv = document.getElementById('recordStatus');
        
        if (!password || !recordUrl) {
            logout();
            return;
        }
        
        // Show loading state
        statusDiv.textContent = '⏳ Adding record...';
        statusDiv.className = 'info';
        statusDiv.classList.remove('hidden');
        
        try {
            const response = await fetch(recordUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    password: password,
                    timestamp: new Date().toISOString()
                })
            });
            
            if (response.ok) {
                const data = await response.json();
                statusDiv.textContent = '✓ ' + (data.message || 'Record added successfully at ' + new Date().toLocaleString());
                statusDiv.className = 'success';
                
                // Auto-hide success message after 5 seconds
                setTimeout(() => {
                    statusDiv.classList.add('hidden');
                }, 5000);
                
                // Refresh the chart after 2 seconds
                setTimeout(() => {
                    refreshChart();
                }, 2000);
                
            } else if (response.status === 401) {
                statusDiv.textContent = '✗ Authentication failed. Please login again.';
                statusDiv.className = 'error-msg';
                setTimeout(() => {
                    logout();
                }, 2000);
            } else {
                const errorData = await response.json().catch(() => ({}));
                statusDiv.textContent = '✗ ' + (errorData.message || 'Failed to add record');
                statusDiv.className = 'error-msg';
            }
        } catch (error) {
            statusDiv.textContent = '✗ Error: ' + error.message;
            statusDiv.className = 'error-msg';
        }
    }
    
    function refreshChart() {
        const iframe = document.getElementById('excelFrame');
        const src = iframe.src;
        iframe.src = '';
        setTimeout(() => {
            iframe.src = src;
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
        }, 100);
    }
    
    function toggleFullscreen() {
        const frame = document.querySelector('.chart-frame');
        if (!document.fullscreenElement) {
            frame.requestFullscreen().catch(err => {
                alert('Error: ' + err.message);
            });
        } else {
            document.exitFullscreen();
        }
    }
</script>
</body>
</html>
